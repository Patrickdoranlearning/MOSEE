name: MOSEE Deep Dive

on:
  schedule:
    # 1st of every month at 03:00 UTC.
    - cron: '0 3 1 * *'
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Pre-created mosee_analysis_runs.id (set by /api/deep-dive/trigger)'
        required: false
        default: ''
        type: string
      run_kind:
        description: 'manual or scheduled'
        required: false
        default: 'manual'
        type: string
      triggered_by:
        description: 'Who/what kicked this off (email, "cron", etc.)'
        required: false
        default: ''
        type: string
      full_market:
        description: 'Run over the entire ticker universe (no MOSEE_LIMIT cap)'
        required: false
        default: true
        type: boolean
      debug_mode:
        description: 'Run in debug mode (5 stocks)'
        required: false
        default: false
        type: boolean

# Only one deep-dive at a time. A new dispatch waits; it does not cancel the running one.
concurrency:
  group: mosee-deep-dive
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 1080  # 18 h cap; full-market run takes hours, not days.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MOSEE Analysis
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          # Deep non-US fundamentals (FMP Starter). Empty/unset = FMP skipped.
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          MOSEE_DEBUG: ${{ github.event.inputs.debug_mode == 'true' && '1' || '0' }}
          # Scheduled runs go full-market; dispatch can override via input.
          MOSEE_FULL: ${{ (github.event_name == 'schedule' || github.event.inputs.full_market == 'true') && '1' || '0' }}
          MOSEE_RUN_ID: ${{ github.event.inputs.run_id }}
          MOSEE_RUN_KIND: ${{ github.event_name == 'schedule' && 'scheduled' || github.event.inputs.run_kind }}
          MOSEE_TRIGGERED_BY: ${{ github.event_name == 'schedule' && 'cron' || github.event.inputs.triggered_by }}
        run: |
          python scripts/run_weekly_analysis.py
